server:
  port: 8081

spring:
  application:
    name: claim-intake-service

  datasource:
    url: jdbc:postgresql://localhost:5432/claims_db
    username: postgres
    password: "0000"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Upload de fichiers ──────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

file:
  upload-dir: uploads/claims

cloudinary:
  cloud-name: dzs1kcaio
  api-key: 218411277875279
  api-secret: bjaguUweNUW6R8sMaL9uDFDAwrA
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.insureflow: DEBUG
    org.hibernate.SQL: DEBUG

groq:
